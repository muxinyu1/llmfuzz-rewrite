services:
  admidio:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:${ADMIDIO_IMAGE_TAG:-admidio-4.3.16}
    restart: unless-stopped
    depends_on:
      - database
    env_file:
      - ${ADMIDIO_ENV_FILE:-.env}
    environment:
      ADMIDIO_DB_TYPE: mysql
      ADMIDIO_DB_HOST: database:3306
      ADMIDIO_DB_NAME: ${ADMIDIO_DB_NAME:-admidio}
      ADMIDIO_DB_TABLE_PRAEFIX: ${ADMIDIO_DB_TABLE_PREFIX:-adm}
      ADMIDIO_DB_USER: ${ADMIDIO_DB_USER:-admidio}
      ADMIDIO_DB_PASSWORD: ${ADMIDIO_DB_PASSWORD:-password}
      ADMIDIO_LOGIN_FOR_UPDATE: ${ADMIDIO_LOGIN_FOR_UPDATE:-0}
      ADMIDIO_ORGANISATION: ${ADMIDIO_ORGANISATION:-DEMO}
      ADMIDIO_PASSWORD_HASH_ALGORITHM: ${ADMIDIO_PASSWORD_HASH_ALGORITHM:-DEFAULT}
      ADMIDIO_ROOT_PATH: http://localhost:${ADMIDIO_HTTP_PORT:-3100}
      TZ: ${TZ:-Europe/Vienna}
    ports:
      - "${ADMIDIO_HTTP_PORT:-3100}:8080"
    volumes:
      - admidio_files:/opt/app-root/src/adm_my_files
      - admidio_themes:/opt/app-root/src/adm_themes
      - admidio_plugins:/opt/app-root/src/adm_plugins
    extra_hosts:
      - host.docker.internal:host-gateway

  database:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:${MARIADB_IMAGE_TAG:-mariadb-10.11-revping}
    restart: unless-stopped
    env_file:
      - ${ADMIDIO_ENV_FILE:-.env}
    environment:
      MYSQL_ROOT_PASSWORD: ${ADMIDIO_DB_ROOT_PASSWORD:-rootpasswd}
      MYSQL_DATABASE: ${ADMIDIO_DB_NAME:-admidio}
      MYSQL_USER: ${ADMIDIO_DB_USER:-admidio}
      MYSQL_PASSWORD: ${ADMIDIO_DB_PASSWORD:-password}
      VERIFIER_HOST: ${VERIFIER_HOST:-host.docker.internal}
      HOST: ${VERIFIER_HOST:-host.docker.internal}
      VERIFIER_PORT: ${VERIFIER_PORT:-8000}
    volumes:
      - admidio_db_data:/var/lib/mysql
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  admidio_db_data:
  admidio_files:
  admidio_themes:
  admidio_plugins:
