services:
  phpmyfaq:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:${PHPMYFAQ_IMAGE_TAG:-phpmyfaq-4.0.13}
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - ${PHPMYFAQ_ENV_FILE:-.env}
    environment:
      PMF_DB_HOST: database
      PMF_DB_NAME: ${MYSQL_DATABASE:-phpmyfaq}
      PMF_DB_USER: ${MYSQL_USER:-phpmyfaq}
      PMF_DB_PASS: ${MYSQL_PASSWORD:-phpmyfaq}
      PMF_TIMEZONE: ${PMF_TIMEZONE:-UTC}
      PMF_ENABLE_UPLOADS: ${PMF_ENABLE_UPLOADS:-On}
      PMF_MEMORY_LIMIT: ${PMF_MEMORY_LIMIT:-1024M}
      PHP_LOG_ERRORS: ${PHP_LOG_ERRORS:-On}
      PHP_ERROR_REPORTING: ${PHP_ERROR_REPORTING:-E_ALL&E_DEPRECATED&E_STRICT}
    ports:
      - "${PHPMYFAQ_HTTP_PORT:-3300}:80"
    volumes:
      - ../../sources/phpMyFAQ/phpmyfaq:/var/www/html
      - phpmyfaq_data:/var/www/html/content/core/data
      - phpmyfaq_logs:/var/www/html/content/core/logs
      - phpmyfaq_images:/var/www/html/content/user/images
      - phpmyfaq_attachments:/var/www/html/content/user/attachments
    extra_hosts:
      - host.docker.internal:host-gateway

  database:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:${MARIADB_IMAGE_TAG:-mariadb-10.11-revping}
    restart: unless-stopped
    env_file:
      - ${PHPMYFAQ_ENV_FILE:-.env}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpasswd}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-phpmyfaq}
      MYSQL_USER: ${MYSQL_USER:-phpmyfaq}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-phpmyfaq}
      VERIFIER_HOST: ${VERIFIER_HOST:-host.docker.internal}
      HOST: ${VERIFIER_HOST:-host.docker.internal}
      VERIFIER_PORT: ${VERIFIER_PORT:-8000}
    volumes:
      - phpmyfaq_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 20s
      retries: 10
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  phpmyfaq_db_data:
  phpmyfaq_data:
  phpmyfaq_logs:
  phpmyfaq_images:
  phpmyfaq_attachments: