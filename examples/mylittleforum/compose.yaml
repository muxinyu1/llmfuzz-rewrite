services:
  mylittleforum:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:${MYLITTLEFORUM_IMAGE_TAG:-mylittleforum-2.5.11}
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - ${MYLITTLEFORUM_ENV_FILE:-.env}
    ports:
      - "${MYLITTLEFORUM_HTTP_PORT:-3400}:80"
    volumes:
      - ../../sources/mylittleforum:/var/www/html
    extra_hosts:
      - host.docker.internal:host-gateway

  database:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:${MARIADB_IMAGE_TAG:-mariadb-10.11-revping}
    restart: unless-stopped
    env_file:
      - ${MYLITTLEFORUM_ENV_FILE:-.env}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpasswd}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mylittleforum}
      MYSQL_USER: ${MYSQL_USER:-mylittleforum}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mylittleforum}
      VERIFIER_HOST: ${VERIFIER_HOST:-host.docker.internal}
      HOST: ${VERIFIER_HOST:-host.docker.internal}
      VERIFIER_PORT: ${VERIFIER_PORT:-8000}
    volumes:
      - mylittleforum_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 20s
      retries: 10
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  mylittleforum_db_data: