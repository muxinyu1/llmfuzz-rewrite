services:
  torrentpier:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:${TORRENTPIER_IMAGE_TAG:-torrentpier-php84}
    restart: unless-stopped
    depends_on:
      - database
    env_file:
      - ${TORRENTPIER_ENV_FILE:-.env}
    environment:
      DB_HOST: database
      DB_PORT: ${DB_PORT:-3306}
      TP_HOST: ${TP_HOST:-localhost}
      TP_PORT: ${TP_PORT:-80}
      APP_ENV: ${APP_ENV:-production}
      APP_CRON_ENABLED: ${APP_CRON_ENABLED:-false}
      APP_DEBUG_MODE: ${APP_DEBUG_MODE:-false}
      APP_DEMO_MODE: ${APP_DEMO_MODE:-false}
    ports:
      - "${TORRENTPIER_HTTP_PORT:-3200}:80"
      - "${TORRENTPIER_HTTPS_PORT:-3443}:443"
      - "${TORRENTPIER_HTTPS_PORT:-3443}:443/udp"
    volumes:
      - torrentpier_data:/app/public/data
      - torrentpier_internal_data:/app/public/internal_data
      - torrentpier_sitemap:/app/public/sitemap
      - ./Caddyfile:/etc/frankenphp/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - host.docker.internal:host-gateway

  database:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:${MARIADB_IMAGE_TAG:-mariadb-10.11-revping}
    restart: unless-stopped
    env_file:
      - ${TORRENTPIER_ENV_FILE:-.env}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-topsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-torrentpier}
      MYSQL_USER: ${DB_USERNAME:-torrentpier_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      VERIFIER_HOST: ${VERIFIER_HOST:-host.docker.internal}
      HOST: ${VERIFIER_HOST:-host.docker.internal}
      VERIFIER_PORT: ${VERIFIER_PORT:-8000}
    volumes:
      - db_data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf:ro
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  db_data:
  torrentpier_data:
  torrentpier_internal_data:
  torrentpier_sitemap:
  caddy_data:
  caddy_config:
