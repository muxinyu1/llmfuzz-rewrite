services:
  database:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:mariadb-10.6-revping
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-churchcrm}
      MYSQL_USER: ${MYSQL_USER:-churchcrm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      VERIFIER_HOST: ${VERIFIER_HOST:-127.0.0.1}
      VERIFIER_PORT: ${VERIFIER_PORT:-80}
      WEB_DEFAULT_USER: ${WEB_DEFAULT_USER:-admin}
      WEB_DEFAULT_PASSWORD: ${WEB_DEFAULT_PASSWORD:-Admin@123456}
    volumes:
      - churchcrm-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 20s
      retries: 10

  webserver:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:churchcrm-5.21.0-php8-apache
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - ${CRM_HTTP_PORT:-8080}:80

volumes:
  churchcrm-db-data:
