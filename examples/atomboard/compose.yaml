services:
  atomboard:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:${ATOMBOARD_IMAGE_TAG:-atomboard-2da51ed}
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - ${ATOMBOARD_ENV_FILE:-.env}
    ports:
      - "${ATOMBOARD_HTTP_PORT:-3600}:80"
    volumes:
      - ../../sources/atomboard:/var/www/html
    extra_hosts:
      - host.docker.internal:host-gateway

  database:
    image: ${REGISTRY_IMAGE_PREFIX:-crpi-8tnv6lve87c20oxm.cn-beijing.personal.cr.aliyuncs.com/llmfuzz/llmfuzz-dockerhub}:${MARIADB_IMAGE_TAG:-mariadb-10.11-revping}
    restart: unless-stopped
    env_file:
      - ${ATOMBOARD_ENV_FILE:-.env}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpasswd}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-atomboard}
      MYSQL_USER: ${MYSQL_USER:-atomboard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-atomboard}
      VERIFIER_HOST: ${VERIFIER_HOST:-host.docker.internal}
      HOST: ${VERIFIER_HOST:-host.docker.internal}
      VERIFIER_PORT: ${VERIFIER_PORT:-8000}
    volumes:
      - atomboard_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      timeout: 20s
      retries: 10
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  atomboard_db_data:
